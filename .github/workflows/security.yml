name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        run: bandit -r experiments/ prototypes/ evaluations/ -c pyproject.toml -f json -o bandit-report.json || true
      - name: Check bandit results
        run: bandit -r experiments/ prototypes/ evaluations/ -c pyproject.toml -ll
